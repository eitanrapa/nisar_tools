name: remote_sensing
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - scipy
  - h5py
  - xarray
  - dask
  - "zarr<3"          # complex64 needs the zarr v2 format
  - numcodecs         # HDF5 unshuffle + stage compressor
  - rioxarray
  - gdal              # osgeo bindings + the gdal_* CLI tools; arrives anyway
                      # as a rasterio dependency, pinned here so it is guaranteed
  - pyproj
  - snaphu
  - pygmt             # optional; only needed for water masking
  - matplotlib
  - ipykernel         # so this env can be a Jupyter kernel
  - pytest
  - pip
  - pip:
      - -e .          # install nisar_tools (editable) from this repo
      # Optional, only for the download module (imported lazily). pip honours
      # Requires-Python, so it picks an earthaccess compatible with 3.11.
      - earthaccess   # Earthdata search/download of GSLCs + orbit ephemeris
      - sardem        # DEM download/stitching (incl. the NISAR reference DEM)
